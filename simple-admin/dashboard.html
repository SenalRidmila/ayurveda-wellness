<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 Ayurveda Wellness Admin Dashboard</title>
    
    <!-- Firebase v9 (Stable version without undici issues) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #2E7D32;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .header p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 20px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #2E7D32;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }
        
        .doctors-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .section-title {
            font-size: 1.5rem;
            color: #2E7D32;
            font-weight: 600;
        }
        
        .refresh-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .refresh-btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        
        .doctors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .doctor-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border-left: 5px solid #FFC107;
        }
        
        .doctor-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }
        
        .doctor-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }
        
        .doctor-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2E7D32;
            margin-bottom: 5px;
        }
        
        .doctor-email {
            color: #666;
            font-size: 0.9rem;
        }
        
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .doctor-details {
            margin: 15px 0;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .detail-label {
            color: #666;
            font-weight: 500;
        }
        
        .detail-value {
            color: #333;
            font-weight: 600;
        }
        
        .doctor-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-approve {
            background: #4CAF50;
            color: white;
        }
        
        .btn-approve:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        
        .btn-reject {
            background: #f44336;
            color: white;
        }
        
        .btn-reject:hover {
            background: #da190b;
            transform: scale(1.05);
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.3s ease;
        }
        
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .modal-title {
            font-size: 1.4rem;
            color: #2E7D32;
            font-weight: 600;
        }
        
        .close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            padding: 5px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        
        .close:hover {
            background: #f5f5f5;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s ease;
            background: #f8f9fa;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #4CAF50;
            background: white;
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        .btn-modal {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-cancel {
            background: #6c757d;
            color: white;
        }
        
        .btn-cancel:hover {
            background: #545b62;
        }
        
        .btn-confirm {
            background: #4CAF50;
            color: white;
        }
        
        .btn-confirm:hover {
            background: #45a049;
        }
        
        .btn-confirm.reject {
            background: #f44336;
        }
        
        .btn-confirm.reject:hover {
            background: #da190b;
        }
        
        .alert {
            padding: 15px 20px;
            margin: 20px 0;
            border-radius: 10px;
            font-weight: 500;
            display: none;
            animation: alertSlideIn 0.3s ease;
        }
        
        @keyframes alertSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .processing {
            opacity: 0.7;
            pointer-events: none;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .doctors-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                margin: 20% auto;
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌿 Ayurveda Wellness Admin</h1>
            <p>Doctor Registration Management System</p>
            <div id="connectionStatus" style="margin-top: 10px; font-size: 0.9rem;"></div>
        </div>

        <div class="stats" id="statsSection">
            <div class="stat-card">
                <div class="stat-number" id="pendingCount">0</div>
                <div class="stat-label">Pending Applications</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="approvedCount">0</div>
                <div class="stat-label">Approved Doctors</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="rejectedCount">0</div>
                <div class="stat-label">Rejected Applications</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total Applications</div>
            </div>
        </div>

        <div class="doctors-section">
            <div class="section-header">
                <div class="section-title">Pending Doctor Applications</div>
                <button class="refresh-btn" onclick="refreshDoctors()">
                    🔄 Refresh
                </button>
            </div>

            <div id="alertContainer"></div>

            <div id="loadingSection" class="loading">
                <div class="spinner"></div>
                <p>Loading doctor applications...</p>
            </div>

            <div id="doctorsContainer" class="doctors-grid"></div>
        </div>
    </div>

    <!-- Modal -->
    <div id="actionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Confirm Action</div>
                <button class="close" onclick="closeModal()">&times;</button>
            </div>
            
            <div id="modalBody">
                <div class="form-group">
                    <label class="form-label">Doctor Information:</label>
                    <div id="doctorInfo" style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px;"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="customMessage">Custom Message (Optional):</label>
                    <textarea 
                        id="customMessage" 
                        class="form-input form-textarea" 
                        placeholder="Enter a custom message for the doctor (leave blank for default message)"
                    ></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Preview:</label>
                    <div id="emailPreview" style="background: #f8f9fa; padding: 15px; border-radius: 8px; font-size: 0.9rem; white-space: pre-line;"></div>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-modal btn-confirm" id="confirmBtn" onclick="confirmAction()">
                    Confirm Action
                </button>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAtdXRG1Nd4riE8aLYVoZ9QuAGV1KoTUsI",
            authDomain: "ayurweda-wellness.firebaseapp.com",
            projectId: "ayurweda-wellness",
            storageBucket: "ayurweda-wellness.appspot.com",
            messagingSenderId: "535385039630",
            appId: "1:535385039630:web:df1409a7a2f0cbab08ed5f",
            measurementId: "G-92572PH5K8"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // EmailJS Configuration - Replace with your actual keys
        emailjs.init("your_public_key_here"); // Replace with your EmailJS public key

        // Global variables
        let doctors = [];
        let selectedDoctor = null;
        let actionType = '';
        let processing = false;

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            updateConnectionStatus('🔄 Connecting to Firebase...');
            loadDoctors();
        });

        function updateConnectionStatus(message) {
            document.getElementById('connectionStatus').innerHTML = message;
        }

        async function loadDoctors() {
            try {
                document.getElementById('loadingSection').style.display = 'block';
                document.getElementById('doctorsContainer').innerHTML = '';
                
                updateConnectionStatus('🔄 Loading doctors...');
                
                const snapshot = await db.collection('doctors').get();
                doctors = [];
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    doctors.push({
                        id: doc.id,
                        ...data,
                        status: data.status || 'pending'
                    });
                });

                updateConnectionStatus('✅ Connected to Firebase');
                updateStats();
                displayDoctors();
                
            } catch (error) {
                console.error('Error loading doctors:', error);
                updateConnectionStatus('❌ Connection failed');
                showAlert('Failed to load doctor applications. Please check your internet connection.', 'error');
            } finally {
                document.getElementById('loadingSection').style.display = 'none';
            }
        }

        function updateStats() {
            const pending = doctors.filter(d => d.status === 'pending').length;
            const approved = doctors.filter(d => d.status === 'approved').length;
            const rejected = doctors.filter(d => d.status === 'rejected').length;
            const total = doctors.length;

            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('approvedCount').textContent = approved;
            document.getElementById('rejectedCount').textContent = rejected;
            document.getElementById('totalCount').textContent = total;
        }

        function displayDoctors() {
            const container = document.getElementById('doctorsContainer');
            const pendingDoctors = doctors.filter(doctor => doctor.status === 'pending');

            if (pendingDoctors.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">👨‍⚕️</div>
                        <h3>No Pending Applications</h3>
                        <p>All doctor applications have been processed.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = pendingDoctors.map(doctor => `
                <div class="doctor-card" id="doctor-${doctor.id}">
                    <div class="doctor-header">
                        <div>
                            <div class="doctor-name">Dr. ${doctor.name || 'N/A'}</div>
                            <div class="doctor-email">📧 ${doctor.email || 'N/A'}</div>
                        </div>
                        <span class="status-badge status-${doctor.status}">${doctor.status}</span>
                    </div>
                    
                    <div class="doctor-details">
                        <div class="detail-row">
                            <span class="detail-label">🏥 Specialization:</span>
                            <span class="detail-value">${doctor.specialization || 'Not specified'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">📍 Location:</span>
                            <span class="detail-value">${doctor.location || 'Not specified'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">⏱️ Experience:</span>
                            <span class="detail-value">${doctor.experience || 0} years</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">📱 Phone:</span>
                            <span class="detail-value">${doctor.phone || 'Not provided'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">📅 Applied:</span>
                            <span class="detail-value">${doctor.createdAt ? new Date(doctor.createdAt.toDate()).toLocaleDateString() : 'Unknown'}</span>
                        </div>
                    </div>
                    
                    <div class="doctor-actions">
                        <button class="btn btn-approve" onclick="openModal('${doctor.id}', 'approve')">
                            ✅ Approve
                        </button>
                        <button class="btn btn-reject" onclick="openModal('${doctor.id}', 'reject')">
                            ❌ Reject
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function openModal(doctorId, action) {
            selectedDoctor = doctors.find(d => d.id === doctorId);
            actionType = action;

            if (!selectedDoctor) {
                showAlert('Doctor not found', 'error');
                return;
            }

            const modal = document.getElementById('actionModal');
            const modalTitle = document.getElementById('modalTitle');
            const doctorInfo = document.getElementById('doctorInfo');
            const confirmBtn = document.getElementById('confirmBtn');
            const customMessage = document.getElementById('customMessage');

            modalTitle.textContent = `${action === 'approve' ? '✅ Approve' : '❌ Reject'} Doctor Application`;
            
            doctorInfo.innerHTML = `
                <strong>Dr. ${selectedDoctor.name}</strong><br>
                📧 ${selectedDoctor.email}<br>
                🏥 ${selectedDoctor.specialization || 'Not specified'}<br>
                📍 ${selectedDoctor.location || 'Not specified'}
            `;

            confirmBtn.textContent = `${action === 'approve' ? '✅ Approve' : '❌ Reject'} & Send Email`;
            confirmBtn.className = `btn-modal btn-confirm ${action === 'reject' ? 'reject' : ''}`;

            customMessage.value = '';
            updateEmailPreview();

            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('actionModal').style.display = 'none';
            selectedDoctor = null;
            actionType = '';
        }

        function updateEmailPreview() {
            const customMessage = document.getElementById('customMessage').value;
            const preview = document.getElementById('emailPreview');
            
            if (!selectedDoctor) return;

            const defaultMessage = getDefaultMessage(actionType, selectedDoctor.name);
            const finalMessage = customMessage.trim() || defaultMessage;

            preview.textContent = `Subject: Doctor Registration ${actionType === 'approve' ? 'Approved' : 'Status'} - Ayurveda Wellness

${finalMessage}`;
        }

        // Update email preview when custom message changes
        document.getElementById('customMessage').addEventListener('input', updateEmailPreview);

        function getDefaultMessage(action, doctorName) {
            if (action === 'approve') {
                return `Dear Dr. ${doctorName},

Congratulations! Your doctor registration with Ayurveda Wellness has been approved.

You can now:
✅ Login to your doctor account
✅ Manage your profile and availability  
✅ Start accepting patient appointments
✅ Access the doctor dashboard

Welcome to our platform! We look forward to working with you to provide excellent healthcare services.

Best regards,
Ayurveda Wellness Admin Team`;
            } else {
                return `Dear Dr. ${doctorName},

Thank you for your interest in joining Ayurveda Wellness.

After careful review of your application, we are unable to approve your registration at this time. This decision may be due to various factors including documentation requirements or current capacity.

You are welcome to reapply in the future once you meet all the requirements.

If you have any questions, please contact our support team.

Best regards,
Ayurveda Wellness Admin Team`;
            }
        }

        async function confirmAction() {
            if (!selectedDoctor || processing) return;

            try {
                processing = true;
                document.querySelector('.modal-content').classList.add('processing');
                
                const confirmBtn = document.getElementById('confirmBtn');
                confirmBtn.textContent = 'Processing...';

                // Update doctor status in Firebase
                const newStatus = actionType === 'approve' ? 'approved' : 'rejected';
                await db.collection('doctors').doc(selectedDoctor.id).update({
                    status: newStatus,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    processedBy: 'admin' // You can replace with actual admin user
                });

                // Send email
                const customMessage = document.getElementById('customMessage').value;
                const emailSent = await sendEmail(selectedDoctor, newStatus, customMessage);

                // Show success message
                const message = `Dr. ${selectedDoctor.name} has been ${newStatus}${emailSent ? ' and email sent' : ' but email failed'} successfully!`;
                showAlert(message, 'success');

                // Refresh the list
                await loadDoctors();
                closeModal();

            } catch (error) {
                console.error('Error processing action:', error);
                showAlert('Failed to process the action. Please try again.', 'error');
            } finally {
                processing = false;
                document.querySelector('.modal-content').classList.remove('processing');
            }
        }

        async function sendEmail(doctor, status, customMessage) {
            try {
                const templateParams = {
                    to_name: doctor.name,
                    to_email: doctor.email,
                    status: status,
                    message: customMessage || getDefaultMessage(status === 'approved' ? 'approve' : 'reject', doctor.name),
                    from_name: 'Ayurveda Wellness Admin Team'
                };

                // Replace 'service_id' and 'template_id' with your actual EmailJS IDs
                await emailjs.send('service_ayurveda', 'template_doctor_approval', templateParams);
                return true;
            } catch (error) {
                console.error('Email sending failed:', error);
                return false;
            }
        }

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alertId = 'alert-' + Date.now();
            
            const alertHtml = `
                <div id="${alertId}" class="alert alert-${type}" style="display: block;">
                    ${message}
                    <button onclick="closeAlert('${alertId}')" style="float: right; background: none; border: none; font-size: 18px; cursor: pointer;">&times;</button>
                </div>
            `;
            
            container.innerHTML = alertHtml;

            // Auto-hide after 5 seconds
            setTimeout(() => {
                closeAlert(alertId);
            }, 5000);
        }

        function closeAlert(alertId) {
            const alert = document.getElementById(alertId);
            if (alert) {
                alert.style.display = 'none';
            }
        }

        function refreshDoctors() {
            loadDoctors();
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('actionModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
